{% extends "timetable/admin/base_admin.html" %}
{% block content %}

<div class="container mt-4">

    <h2 class="fw-bold">Edit Teacher</h2>

    <div class="card shadow-sm mt-3">
        <div class="card-body">

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label>First Name</label>
                    <input name="first_name"
                           value="{{ teacher.first_name }}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Last Name</label>
                    <input name="last_name"
                           value="{{ teacher.last_name }}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Username</label>
                    <input name="username"
                           value="{{ teacher.username }}"
                           class="form-control">
                </div>

                <hr>

                <div class="mb-3">
                    <label>Reset Password (optional)</label>
                    <input name="password"
                           type="password"
                           class="form-control"
                           placeholder="Leave empty if no change">
                </div>

                <button class="btn btn-primary">
                    Save Changes
                </button>

            </form>

        </div>
    </div>

</div>

{% endblock %}
