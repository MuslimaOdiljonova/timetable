<!DOCTYPE html>
<html>
<head>
    <title>MU Admin Panel</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f6fa;
        }

        .layout {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: #111827;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .nav a {
            display: block;
            padding: 10px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 6px;
        }

        .nav a:hover {
            background: #374151;
            color: white;
        }

        /* CONTENT */
        .content {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }

        .topbar {
            background: white;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* UI SYSTEM */
        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            display: inline-block;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .table th {
            background: #111827;
            color: white;
            padding: 10px;
        }

        .table td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>MU Admin</h2>

        <div class="nav">
            <a href="/admin-panel/departments/">Departments</a>
            <a href="/admin-panel/red-days/">Red Days</a>
        </div>
    <hr style="border-color:#374151; margin:15px 0;">

    <form method="post" action="{% url 'accounts:logout' %}" style="margin:0;">        {% csrf_token %}
        <button class="btn btn-danger" style="width:100%;">
            Logout
        </button>
    </form>
</div>

    <!-- CONTENT -->
    <div class="content">

        <div class="topbar">
            {% block page_title %}Admin Panel{% endblock %}
        </div>

        {% block content %}
        {% endblock %}

    </div>

</div>

</body>
</html>
